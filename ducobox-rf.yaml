# Include components
external_components:
  - source: github://Henkeh/DucoBox-ESPHome@main
    components: [duco_rf]

# Enable Home Assistant API
api:

# Configure OTA
ota:
  - platform: esphome
    password: ""              # Change to a secure password if used in a non-secure environment

# Configure WiFi
wifi:
  ssid: "DummySSID"           # Change to your WiFi SSID
  password: "DummyPassword"   # Change to your WiFi password
  use_address: 1.2.3.4         # Change to the desired static IP address for this device (if not using DHCP)
  min_auth_mode: WPA2

# Enable web server
web_server:
  port: 80
  version: '3'

# Configure ESP32 specific settings
esp32:
  board: esp32-s3-devkitc-1   # Change to your board if different and update pin numbers accordingly
  cpu_frequency: 240MHz
  variant: esp32s3
  framework:
    type: esp-idf
    advanced:
      assertion_level: DISABLE
      compiler_optimization: PERF

esphome:
  name: ducobox-rf
  friendly_name: DucoBox RF
  on_boot:
    - priority: -10
      then:
        # Get the ventilation box and this controller into sync by forcing "auto" mode right after startup, which should be a safe default that is accepted by the ventilation box regardless of its current state
        - delay: 2s
        - lambda: |-
            id(duco_rf_gw).request_ventilation_mode(0, false, 0);

# ── RF gateway (write) ────────────────────────────────────────────────────
logger:
  baud_rate: 0
  level: INFO

duco_rf:
  id: duco_rf_gw
  cc1101_id: duco_cc1101
  vent_mode_text_sensor: ventilation_mode_rf_text
  network_id_text_sensor: network_id_text
  device_address_text_sensor: device_address_text

cc1101:
  id: duco_cc1101
  spi_id: duco_spi
  cs_pin: GPIO07          # Change to the correct CS pin for your board
  gdo0_pin: GPIO06        # Change to the correct GDO0 pin for your board (used for packet reception indication)
  packet_mode: true
  packet_length: 0
  crc_enable: true
  whitening: false
  modulation_type: GFSK
  frequency: 868.326447MHz
  sync_mode: 30/32
  if_frequency: 152344Hz
  channel: 0
  symbol_rate: 38383
  filter_bandwidth: 101562Hz
  channel_spacing: 199951Hz
  fsk_deviation: 20630Hz
  sync1: 0xD3
  sync0: 0x91
  num_preamble: 4

spi:
  id: duco_spi
  clk_pin: GPIO02       # Change to the correct CLK pin for your board
  miso_pin: GPIO04      # Change to the correct MISO pin for your board
  mosi_pin: GPIO01      # Change to the correct MOSI pin for your board

text_sensor:
  - platform: template
    id: ventilation_mode_rf_text
    name: "Ventilation mode RF text"
    icon: "mdi:fan"

  - platform: template
    id: network_id_text
    name: "Network ID"
    entity_category: diagnostic
    icon: "mdi:identifier"

  - platform: template
    id: device_address_text
    name: "Device Address"
    entity_category: diagnostic
    icon: "mdi:numeric"

globals:
  - id: fan_sync_in_progress
    type: bool
    initial_value: 'false'

number:
  - platform: template
    id: ventilation_percentage_number
    name: "Ventilation Percentage"
    icon: "mdi:percent"
    optimistic: true
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 0
    mode: box
    set_action:
      - lambda: |-
          // Note that percentage set is only honored by the ventilation when it is set higher than the current determined demand in auto mode.
          id(duco_rf_gw).request_ventilation_mode(0, false, x);

switch:
  - platform: template
    id: ventilation_permanent_switch
    name: "Ventilation Permanent"
    icon: "mdi:pin"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - lambda: |-
          if (id(fan_sync_in_progress)) {
            return;
          }

          uint8_t mode = 0;

          if (!id(duco_ventilation_fan).state) {
            mode = 7;  // Off maps to Away
          } else {
            const std::string preset = id(duco_ventilation_fan).get_preset_mode();
            if (preset == "Away") {
              mode = 7;
            } else if (preset == "Auto") {
              mode = 0;
            } else if (id(duco_ventilation_fan).speed == 1) {
              mode = 4;
            } else if (id(duco_ventilation_fan).speed == 2) {
              mode = 5;
            } else {
              mode = 6;
            }
          }

          id(duco_rf_gw).request_ventilation_mode(mode, true, 0);
    turn_off_action:
      - lambda: |-
          if (id(fan_sync_in_progress)) {
            return;
          }

          uint8_t mode = 0;

          if (!id(duco_ventilation_fan).state) {
            mode = 7;  // Off maps to Away
          } else {
            const std::string preset = id(duco_ventilation_fan).get_preset_mode();
            if (preset == "Away") {
              mode = 7;
            } else if (preset == "Auto") {
              mode = 0;
            } else if (id(duco_ventilation_fan).speed == 1) {
              mode = 4;
            } else if (id(duco_ventilation_fan).speed == 2) {
              mode = 5;
            } else {
              mode = 6;
            }
          }

          id(duco_rf_gw).request_ventilation_mode(mode, false, 0);

fan:
  - platform: template
    id: duco_ventilation_fan
    name: "Duco Ventilation"
    icon: "mdi:fan"
    speed_count: 3
    preset_modes:
      - "Auto"
      - "Away"
    on_turn_on:
      - lambda: |-
          if (id(fan_sync_in_progress)) {
            return;
          }
          const bool permanent = id(ventilation_permanent_switch).state;
          id(duco_rf_gw).request_ventilation_mode(4, permanent, 0);
    on_turn_off:
      - lambda: |-
          if (id(fan_sync_in_progress)) {
            return;
          }
          const bool permanent = id(ventilation_permanent_switch).state;
          id(duco_rf_gw).request_ventilation_mode(7, permanent, 0);
    on_speed_set:
      - lambda: |-
          if (id(fan_sync_in_progress)) {
            return;
          }
          const bool permanent = id(ventilation_permanent_switch).state;
          uint8_t mode = 4;
          if (id(duco_ventilation_fan).speed == 2) {
            mode = 5;
          } else if (id(duco_ventilation_fan).speed >= 3) {
            mode = 6;
          }
          id(duco_rf_gw).request_ventilation_mode(mode, permanent, 0);
    on_preset_set:
      - lambda: |-
          if (id(fan_sync_in_progress)) {
            return;
          }
          const std::string preset = id(duco_ventilation_fan).get_preset_mode();
          if (preset.empty()) {
            ESP_LOGD("duco_rf", "Fan preset cleared after manual speed change; ignoring preset callback");
            return;
          }
          if (preset != "Auto" && preset != "Away") {
            ESP_LOGW("duco_rf", "Fan preset set callback received unknown preset=%s; ignoring", preset.c_str());
            return;
          }
          const bool permanent = id(ventilation_permanent_switch).state;
          uint8_t mode = 0;
          if (preset == "Away") {
            mode = 7;
          }
          id(duco_rf_gw).request_ventilation_mode(mode, permanent, 0);

button:
  - platform: template
    name: "Pair"
    icon: "mdi:link-variant"
    entity_category: config
    on_press:
      - lambda: 'id(duco_rf_gw).pair();'

  - platform: template
    name: "Unpair"
    icon: "mdi:link-variant-off"
    entity_category: config
    on_press:
      - lambda: 'id(duco_rf_gw).unpair();'

  - platform: template
    name: "Enable Installer Mode"
    icon: "mdi:restart"
    entity_category: config
    on_press:
      - lambda: 'id(duco_rf_gw).enable_installer_mode();'

  - platform: template
    name: "Disable Installer Mode"
    icon: "mdi:stop"
    entity_category: config
    on_press:
      - lambda: 'id(duco_rf_gw).disable_installer_mode();'
